name: Deploy Grubed X

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # We only need 20.x or 22.x for modern Vite/pnpm features
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9 # Matches the versioning logic we used on your server

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Build Project
      run: |
        pnpm install
        pnpm build
      env:
        # Add these so the build doesn't crash from your strict vite.config.ts
        PORT: 3000
        BASE_PATH: /
